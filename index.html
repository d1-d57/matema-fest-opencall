<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Матема-фест</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #111;
      padding: 24px;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #f5f5f5; }
      a { color: #9ecbff; }
    }
    main { max-width: 520px; }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 16px; font-weight: 700; letter-spacing: -0.02em; }
    p { font-size: 1.125rem; margin: 0 0 24px; opacity: 0.8; }
    a.cta {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid currentColor;
      border-radius: 999px;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
    }
    a.cta:hover { background: currentColor; }
    a.cta:hover span { color: #fafafa; }
    @media (prefers-color-scheme: dark) { a.cta:hover span { color: #111; } }
  </style>
</head>
<body>
  <main>
    <h1>Матема-фест</h1>
    <p>Фестиваль о математике, её людях и явлениях.</p>
    <a class="cta" href="opencall2026/"><span>Open call 2026 →</span></a>
  </main>
</body>
</html>
