<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Фрактальная Одиссея — Matema-фест 2026</title>
<meta name="description" content="Фестиваль о фракталах, самоподобии и симметриях в жизни, науке и искусстве. 23 мая 2026, Чистые пруды, Москва." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #e8ecd4;
    --ink: #16191a;
    --ink-soft: #3a3e36;
    --accent: #c93428;
    --rule: rgba(22,25,26,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Golos Text", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  /* ——— верхняя полоска ——— */
  .top-bar {
    padding: 18px 36px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-family: "JetBrains Mono", monospace;
  }
  .top-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.005em;
  }
  .top-meta .dot {
    opacity: 0.5;
    font-weight: 400;
    font-size: 18px;
  }
  .top-brand {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.005em;
  }

  /* ——— центральный блок ——— */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  /* ——— заголовок: ФРАКТАЛЬНАЯ моно + ОДИССЕЯ крупнее ——— */
  .title-block {
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.15s forwards;
  }
  .title-top {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: clamp(24px, 4.5vw, 48px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.1;
    display: block;
  }
  .title-bottom {
    font-family: "Golos Text", sans-serif;
    font-weight: 800;
    font-size: clamp(56px, 12vw, 150px);
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 0.88;
    display: block;
    margin-top: 6px;
  }

  /* ——— описание ——— */
  .desc {
    font-size: clamp(15px, 2vw, 18px);
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 38ch;
    margin-bottom: 44px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.35s forwards;
  }

  /* ——— кнопка ——— */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 16px 32px;
    border: 2px solid var(--accent);
    transition: background 0.18s ease, color 0.18s ease;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.5s forwards;
  }
  .cta:hover {
    background: transparent;
    color: var(--accent);
  }
  .cta .arrow {
    font-size: 16px;
    transition: transform 0.18s ease;
  }
  .cta:hover .arrow {
    transform: translateX(4px);
  }

  /* ——— нижняя строка ——— */
  .bottom-bar {
    padding: 16px 36px;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.8s forwards;
  }
  .bottom-bar a {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .bottom-bar a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .bottom-bar .sep {
    color: var(--rule);
    font-size: 14px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 600px) {
    .top-bar { padding: 14px 20px; }
    .top-meta { font-size: 16px; }
    .top-brand { font-size: 16px; }
    .stage { padding: 40px 16px; }
    .title-top { letter-spacing: 0.16em; }
    .bottom-bar { padding: 14px 20px; gap: 16px; }
  }
  @media (max-width: 400px) {
    .top-brand { display: none; }
  }
</style>
</head>
<body>

  <div class="top-bar">
    <div class="top-meta">
      <span>23 мая</span>
      <span class="dot">·</span>
      <span>Чистые пруды</span>
      <span class="dot">·</span>
      <span>18+</span>
    </div>
    <span class="top-brand">Matema-фест · 2026</span>
  </div>

  <main class="stage">
    <div class="title-block">
      <span class="title-top">Фрактальная</span>
      <span class="title-bottom">Одиссея</span>
    </div>
    <p class="desc">
      О фракталах, самоподобии и симметриях в жизни, науке и искусстве
    </p>
    <a href="/opencall2026/" class="cta">
      Open Call <span class="arrow">→</span>
    </a>
  </main>

  <div class="bottom-bar">
    <a href="https://t.me/turings_crossword" target="_blank" rel="noopener">Кроссворд Тьюринга</a>
    <span class="sep">·</span>
    <a href="https://t.me/d1_d57" target="_blank" rel="noopener">@d1_d57</a>
  </div>

</body>
</html>
